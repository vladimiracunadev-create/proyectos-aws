AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: caso-f-security-cognito visualization - REST API + Cognito Authorizer + WAF

Parameters:
  DemoPageUrl:
    Type: String
    Default: ""
    Description: URL publica del DEMO principal para enlazar desde la pagina WAF

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.12
    Tracing: Active

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: caso-f-user-pool-visualization
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: caso-f-app-client-visualization
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: caso-f-security-cognito-visualization
      StageName: Prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  SecurityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          COGNITO_USER_POOL_ID: !Ref UserPool
          DEPLOYMENT_MODE: visualization-rest-waf
          PERIMETER_MODE: rest-api-cognito-authorizer-waf
          DEMO_PAGE_URL: !Ref DemoPageUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:InitiateAuth
                - xray:PutTelemetryRecords
                - xray:PutTraceSegments
              Resource: "*"
      Events:
        RootLanding:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: get
            Auth:
              Authorizer: NONE
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: get
            Auth:
              Authorizer: NONE
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/register
            Method: post
            Auth:
              Authorizer: NONE
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/login
            Method: post
            Auth:
              Authorizer: NONE
        Profile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: get

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.pre_signup_trigger
      Description: Auto-confirma usuarios para visualization. No usar en produccion.

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: caso-f-security-cognito-visualization
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: caso-f-security-cognito-visualization
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: caso-f-security-cognito-common
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesSQLiRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: caso-f-security-cognito-sqli
            SampledRequestsEnabled: true

  WafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn:
      - ApiProdStage
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${Api}/stages/Prod"
      WebACLArn: !GetAtt WafWebAcl.Arn

Outputs:
  ApiBaseUrl:
    Description: URL base del REST API visualization
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UserPoolId:
    Description: ID del Cognito User Pool
    Value: !Ref UserPool

  UserPoolClientId:
    Description: ID del App Client (sin secreto)
    Value: !Ref UserPoolClient

  FunctionName:
    Description: Nombre de la Lambda principal
    Value: !Ref SecurityFunction

  WebAclArn:
    Description: ARN del WAF WebACL
    Value: !GetAtt WafWebAcl.Arn

  DeploymentMode:
    Description: Modalidad del despliegue
    Value: visualization-rest-waf
