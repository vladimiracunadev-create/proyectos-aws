AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: caso-f-security-cognito visualization - REST API + WAF enlazado al DEMO principal

Parameters:
  DemoPageUrl:
    Type: String
    Default: ""
    Description: URL publica del DEMO principal para enlazar desde la pagina WAF

  ExistingUserPoolArn:
    Type: String
    Description: ARN del Cognito User Pool ya creado por el DEMO principal

  ExistingUserPoolId:
    Type: String
    Description: ID del Cognito User Pool ya creado por el DEMO principal

  ExistingUserPoolClientId:
    Type: String
    Description: App Client ID del Cognito User Pool ya creado por el DEMO principal

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.12
    Tracing: Active

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: caso-f-security-cognito-visualization
      StageName: Prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref ExistingUserPoolArn

  SecurityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref ExistingUserPoolClientId
          COGNITO_USER_POOL_ID: !Ref ExistingUserPoolId
          DEPLOYMENT_MODE: visualization-rest-waf
          PERIMETER_MODE: rest-api-cognito-authorizer-waf
          DEMO_PAGE_URL: !Ref DemoPageUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - xray:PutTelemetryRecords
                - xray:PutTraceSegments
              Resource: "*"
      Events:
        RootLanding:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: get
            Auth:
              Authorizer: NONE
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: get
            Auth:
              Authorizer: NONE
        Profile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /profile
            Method: get

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: caso-f-security-cognito-visualization
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: caso-f-security-cognito-visualization
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: caso-f-security-cognito-common
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesSQLiRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: caso-f-security-cognito-sqli
            SampledRequestsEnabled: true

  WafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn:
      - ApiProdStage
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${Api}/stages/Prod"
      WebACLArn: !GetAtt WafWebAcl.Arn

Outputs:
  ApiBaseUrl:
    Description: URL base del REST API visualization
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UserPoolId:
    Description: ID del Cognito User Pool reutilizado desde el DEMO
    Value: !Ref ExistingUserPoolId

  UserPoolClientId:
    Description: ID del App Client reutilizado desde el DEMO
    Value: !Ref ExistingUserPoolClientId

  UserPoolArn:
    Description: ARN del Cognito User Pool reutilizado desde el DEMO
    Value: !Ref ExistingUserPoolArn

  FunctionName:
    Description: Nombre de la Lambda principal
    Value: !Ref SecurityFunction

  WebAclArn:
    Description: ARN del WAF WebACL
    Value: !GetAtt WafWebAcl.Arn

  DeploymentMode:
    Description: Modalidad del despliegue
    Value: visualization-rest-waf
