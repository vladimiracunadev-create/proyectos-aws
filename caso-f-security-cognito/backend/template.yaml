AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: caso-f-security-cognito demo - Cognito User Pool + HTTP API JWT Authorizer

Parameters:
  SupportPageUrl:
    Type: String
    Default: ""
    Description: URL publica de la pagina WAF auxiliar enlazada desde el DEMO

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.12
    Tracing: Active

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: caso-f-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: caso-f-app-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
      Auth:
        DefaultAuthorizer: CognitoJwtAuth
        Authorizers:
          CognitoJwtAuth:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  SecurityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          COGNITO_USER_POOL_ID: !Ref UserPool
          DEPLOYMENT_MODE: demo-http-jwt
          PERIMETER_MODE: http-api-jwt-authorizer
          SUPPORT_PAGE_URL: !Ref SupportPageUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:InitiateAuth
                - xray:PutTelemetryRecords
                - xray:PutTraceSegments
              Resource: "*"
      Events:
        RootLanding:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /
            Method: GET
            Auth:
              Authorizer: NONE
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
        Profile:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /profile
            Method: GET

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.pre_signup_trigger
      Description: Auto-confirma usuarios para demo. No usar en produccion.

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

Outputs:
  ApiBaseUrl:
    Description: URL base del HTTP API demo
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"

  UserPoolId:
    Description: ID del Cognito User Pool
    Value: !Ref UserPool

  UserPoolClientId:
    Description: ID del App Client (sin secreto)
    Value: !Ref UserPoolClient

  FunctionName:
    Description: Nombre de la Lambda principal
    Value: !Ref SecurityFunction

  DeploymentMode:
    Description: Modalidad del despliegue
    Value: demo-http-jwt
