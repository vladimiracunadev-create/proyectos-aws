apiVersion: apps/v1
kind: Deployment
metadata:
  name: vladimir-app
  labels:
    app: vladimir-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vladimir-app
  template:
    metadata:
      labels:
        app: vladimir-app
    spec:
      containers:
      - name: app
        # Nota: Deberás subir esta imagen a tu ECR o DockerHub
        image: vladimiracunadev/vladimir-eks-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: vladimir-app-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: vladimir-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
