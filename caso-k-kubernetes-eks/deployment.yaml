apiVersion: apps/v1
kind: Deployment
metadata:
  name: vladimir-api
  labels:
    app: vladimir-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vladimir-api
  template:
    metadata:
      labels:
        app: vladimir-api
    spec:
      containers:
      - name: api
        image: vladimiracunadev/vladimir-api:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: vladimir-api-service
spec:
  selector:
    app: vladimir-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
