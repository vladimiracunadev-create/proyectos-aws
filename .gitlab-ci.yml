image: node:18

variables:
  GIT_DEPTH: 0

stages:
  - security
  - plan-infrastructure
  - test
  - deploy

# --- Security Checks (IaC) ---
# --- Security Checks (IaC) ---
secret_detection:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source . --no-git
  allow_failure: true

dependency_scan:
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true

scan_infrastructure:
  stage: security
  image:
    name: aquasec/tfsec:v1.28.1
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  script:
    - tfsec caso-c-terraform-s3

cache:
  paths:
    - node_modules/

# --- Global Checks ---
lint:
  stage: test
  script:
    - npm ci
    - npm run lint
  rules:
    - changes:
        - "**/*.{js,css,html,md}"
        - package.json
        - .eslintrc.js
        - .prettierrc

# --- Caso B: Legacy S3 Sync ---
deploy_case_b:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-b-gitlab-s3/**/*
  script:
    - echo "Deploying Case B to S3..."
    - |
      if [ -z "$S3_BUCKET" ]; then
        echo "ERROR: La variable S3_BUCKET no está definida en GitLab CI/CD Variables."
        exit 1
      fi
    - aws s3 sync caso-b-gitlab-s3/ "s3://$S3_BUCKET/" --delete --exclude "*.md"
  environment:
    name: production/case-b

# --- Caso C: Terraform (Infraestructura y App) ---
plan_case_c:
  stage: plan-infrastructure
  image:
    name: hashicorp/terraform:1.14.3
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  script:
    - cd caso-c-terraform-s3
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - caso-c-terraform-s3/tfplan
    expire_in: 1 hour

deploy_case_c:
  stage: deploy
  image:
    name: hashicorp/terraform:1.14.3
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  needs:
    - plan_case_c
  script:
    - cd caso-c-terraform-s3
    - terraform init
    - terraform apply -auto-approve tfplan
  environment:
    name: production/case-c







pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html manifest.json sw.js *.md *.txt public/
    - cp -r assets docs wiki apps caso-* public/
    - find public -name ".git" -type d -exec rm -rf {} +
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- OIDC Verification Job (Case L) ---
verify_oidc_connection:
  stage: deploy
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - echo "Iniciando autenticación OIDC..."
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn ${AWS_ROLE_ARN}
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))
    - aws sts get-caller-identity
    - echo "¡Conexión exitosa! Ahora somos el rol ${AWS_ROLE_ARN}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# --- Despliegue Final a Producción (Case L) ---
# --- Despliegue Final a Producción (Case L) ---
deploy_case_l_final:
  stage: deploy
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - echo "Autenticando con AWS OIDC..."
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn ${AWS_ROLE_ARN}
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))
    - echo "Desplegando archivos a S3..."
    - aws s3 sync caso-l-finops-optimization/app/public/ s3://${S3_BUCKET_CASE_L} --delete
    - echo "✅ Despliegue completado."
    - echo "🌍 Tu sitio web: http://${S3_BUCKET_CASE_L}.s3-website-${AWS_REGION}.amazonaws.com"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-l-finops-optimization/**/*
    - if: '$CI_PIPELINE_SOURCE == "web"'

