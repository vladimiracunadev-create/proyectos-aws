image: node:18

variables:
  GIT_DEPTH: 0

stages:
  - security
  - plan-infrastructure
  - test
  - deploy

# --- Security Checks (IaC) ---
# --- Security Checks (IaC) ---
secret_detection:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source . --no-git
  allow_failure: true

dependency_scan:
  stage: security
  script:
    # audit-level=critical: las vulnerabilidades "high" restantes son de eslint@8 (minimatch@3),
    # sin fix disponible sin migrar a eslint@9+ (breaking change en configuración).
    - npm audit --audit-level=critical
  allow_failure: true

scan_infrastructure:
  stage: security
  image:
    name: aquasec/tfsec:v1.28.1
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  script:
    - tfsec caso-c-terraform-s3

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
  policy: pull-push

# --- Global Checks ---
lint:
  stage: test
  script:
    - npm ci
    - npm run lint
  rules:
    - changes:
        - "**/*.{js,css,html,md}"
        - package.json
        - .eslintrc.js
        - .prettierrc

# --- Caso D: Unit Tests ---
test_caso_d:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - caso-d-serverless-basic/**/*
  script:
    - pip install --quiet pytest boto3
    - pytest caso-d-serverless-basic/backend/tests/ -v --tb=short

# --- Caso E: Unit Tests ---
test_caso_e:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - caso-e-dynamodb-persistence/**/*
  script:
    - pip install --quiet pytest boto3
    - pytest caso-e-dynamodb-persistence/backend/tests/ -v --tb=short

# --- Caso G: Unit Tests ---
test_caso_g:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - caso-g-event-driven/**/*
  script:
    - pip install --quiet pytest boto3
    - pytest caso-g-event-driven/backend/tests/ -v --tb=short

# --- Caso H: Unit Tests ---
test_caso_h:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - caso-h-observability/**/*
  script:
    - pip install --quiet pytest boto3
    - pytest caso-h-observability/backend/tests/ -v --tb=short

# --- Caso F: Unit Tests ---
test_caso_f:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - caso-f-security-cognito/**/*
  script:
    - pip install --quiet pytest boto3
    - pytest caso-f-security-cognito/backend/tests/ -v --tb=short

# --- Caso B: Legacy S3 Sync ---
deploy_case_b:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-b-gitlab-s3/**/*
  script:
    - echo "Deploying Case B to S3..."
    - |
      if [ -z "$S3_BUCKET" ]; then
        echo "ERROR: La variable S3_BUCKET no está definida en GitLab CI/CD Variables."
        exit 1
      fi
    - aws s3 sync caso-b-gitlab-s3/ "s3://$S3_BUCKET/" --delete --exclude "*.md"
  environment:
    name: production/case-b

# --- Caso C: Terraform (Infraestructura y App) ---
plan_case_c:
  stage: plan-infrastructure
  image:
    name: hashicorp/terraform:1.14.3
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  script:
    - cd caso-c-terraform-s3
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - caso-c-terraform-s3/tfplan
    expire_in: 1 hour

deploy_case_c:
  stage: deploy
  image:
    name: hashicorp/terraform:1.14.3
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  needs:
    - plan_case_c
  script:
    - cd caso-c-terraform-s3
    - terraform init
    - terraform apply -auto-approve tfplan
  environment:
    name: production/case-c

# Invalida la caché de CloudFront tras el deploy de Terraform.
# Job separado porque la imagen de Terraform no incluye AWS CLI.
invalidate_cloudfront_c:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-c-terraform-s3/**/*
  needs:
    - deploy_case_c
  script:
    - echo "Invalidando caché de CloudFront..."
    - aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID_C" --paths "/*"
    - echo "Invalidación enviada correctamente."
  environment:
    name: production/case-c








pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html manifest.json sw.js *.md *.txt public/
    - cp -r assets docs wiki apps caso-* public/
    - find public -name ".git" -type d -exec rm -rf {} +
  artifacts:
    paths:
      - public
    expire_in: 1 day  # El sitio vive en Pages, no necesitamos guardar el histórico de artefactos pesados.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- Job de Verificación eliminado (integrado en deploy) ---

# --- Caso M: Resiliencia & Failover (FUTURO — Validación offline, sin credenciales AWS) ---
# Job MANUAL con allow_failure: true.
# Solo ejecuta terraform fmt/validate (sin AWS). No requiere secretos.
# Desacoplado del pipeline principal: no bloquea otros stages.
# NOTA: when:manual va SOLO dentro de rules: (no a nivel de job, incompatible en GitLab CI).
case_m_validate:
  stage: test
  image:
    name: hashicorp/terraform:1.14.3
    entrypoint: [""]
  allow_failure: true
  rules:
    - changes:
        - caso-m-resiliencia-failover/**/*
      when: manual
    - when: never
  script:
    - echo "=== Caso M Validacion offline sin credenciales AWS ==="
    - cd caso-m-resiliencia-failover/infra/terraform
    - echo "--- terraform fmt check ---"
    - terraform fmt -check -recursive
    - echo "--- terraform init backend=false ---"
    - terraform init -backend=false
    - echo "--- terraform validate ---"
    - terraform validate
    - echo "=== Validacion completada sin errores ==="

# --- Actualización de Datos FinOps (Case L) ---
refresh_finops_data:
  stage: deploy
  image: python:3.9
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - pip install boto3
  script:
    - echo "Generando datos de costos..."
    - export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" $(aws sts assume-role-with-web-identity --role-arn ${AWS_ROLE_ARN} --role-session-name "GitLabFinOps-${CI_PIPELINE_ID}" --web-identity-token ${GITLAB_OIDC_TOKEN} --duration-seconds 3600 --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text))
    - python3 caso-l-finops-optimization/generate_finops_data.py
    - echo "Subiendo costs.json a S3..."
    - aws s3 cp caso-l-finops-optimization/app/public/costs.json s3://${S3_BUCKET_CASE_L}/costs.json --acl public-read
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# --- Despliegue Final a Producción (Case L) ---
deploy_case_l_final:
  stage: deploy
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - chmod +x deploy.sh
    - ./deploy.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-l-finops-optimization/**/*
    - if: '$CI_PIPELINE_SOURCE == "web"'

