stages:
  - test
  - deploy

lint:
  stage: test
  image: node:18
  rules:
    - changes:
        - .gitlab-ci.yml
        - caso-a-amplify/**/*
        - caso-b-gitlab-s3/**/*
  before_script:
    - npm install -g htmlhint csslint || true
  script:
    - echo "Running HTML checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.html" -print0 | xargs -0 -r htmlhint || true
    - echo "Running CSS checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.css" -print0 | xargs -0 -r csslint || true
    - echo "Running JS syntax checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.js" -print0 | xargs -0 -r -n1 sh -c 'node --check "$0"' || true
  allow_failure: false

deploy_prod:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install --no-cache-dir awscli
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - .gitlab-ci.yml
        - caso-b-gitlab-s3/**/*
  script:
    - set -eux
    - test -n "$S3_BUCKET"
    - test -n "$AWS_DEFAULT_REGION"
    - test -d caso-b-gitlab-s3
    - aws --version
    - aws sts get-caller-identity
    - aws s3 ls "s3://$S3_BUCKET/"
    - aws s3 sync "caso-b-gitlab-s3/" "s3://$S3_BUCKET/" --delete --exclude "*.md"
  environment:
    name: production

