image: node:18

stages:
  - test
  - deploy
  - plan-infrastructure

cache:
  paths:
    - node_modules/

# --- Global Checks ---
lint:
  stage: test
  script:
    - npm ci
    - npm run lint
  rules:
    - changes:
        - "**/*.{js,css,html,md}"
        - package.json
        - .eslintrc.js
        - .prettierrc

# --- Caso B: Legacy S3 Sync ---
deploy_case_b:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-b-gitlab-s3/**/*
  script:
    - echo "Deploying Case B to S3..."
    - aws s3 sync caso-b-gitlab-s3/ "s3://$S3_BUCKET_CASO_B/" --delete --exclude "*.md"
  environment:
    name: production/case-b

