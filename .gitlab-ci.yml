stages:
  - test
  - deploy

lint:
  stage: test
  image: node:18
  rules:
    - changes:
        - caso-a-amplify/**/*
        - caso-b-gitlab-s3/**/*
  before_script:
    - npm install -g htmlhint csslint || true
  script:
    - echo "Running HTML checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.html" -print0 | xargs -0 -r htmlhint || true
    - echo "Running CSS checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.css" -print0 | xargs -0 -r csslint || true
    - echo "Running JS syntax checks..."
    - find caso-a-amplify caso-b-gitlab-s3 -name "*.js" -print0 | xargs -0 -r -n1 sh -c 'node --check "$0"' || true
  allow_failure: false

deploy_prod:
  stage: deploy
  image: amazon/aws-cli:2
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - caso-b-gitlab-s3/**/*
  script:
    - aws s3 sync caso-b-gitlab-s3 "s3://$S3_BUCKET/" --delete
    - |
      if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
        aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
      fi
  environment:
    name: production
