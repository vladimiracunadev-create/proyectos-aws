AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: caso-e-dynamodb-persistence - API serverless para modelado NoSQL con DynamoDB

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: python3.12

Resources:
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: persistence_pro_orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsi2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  OrdersApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /orders
            Method: POST
        GetCustomerOrders:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /customers/{customerId}/orders
            Method: GET
        GetOrdersByStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /orders/status/{status}
            Method: GET
        GetProductOrders:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /products/{productId}/orders
            Method: GET

Outputs:
  ApiBaseUrl:
    Description: URL base del HTTP API
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"

  OrdersTableName:
    Description: Nombre de la tabla DynamoDB
    Value: !Ref OrdersTable
