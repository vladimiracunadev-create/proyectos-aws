version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caso-j-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    # Simulamos límites de recursos como en ECS Fargate
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # Healthcheck visible en docker ps
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Mapeo de volumen para hot-reload (opcional, útil en dev)
    # volumes:
    #   - .:/app
    #   - /app/node_modules
