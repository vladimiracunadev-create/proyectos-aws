name: Caso 02 — S3 Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'caso-02-s3-github-actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v7

      - name: ¿Dónde estoy y qué veo?
        run: |
          echo "La carpeta actual es:"
          pwd
          echo "Los archivos que veo son:"
          ls -R

      - name: Sincronizar subcarpeta con AWS S3
        run: |
          aws s3 sync ./caso-02-s3-github-actions s3://mi-pagina-scrum-123 --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-2'
