name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extrae la sección del CHANGELOG para esta versión
          NOTES=$(awk "/## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Ver [CHANGELOG.md](CHANGELOG.md) para detalles de este release."
          fi
          # Escapa saltos de línea para GitHub output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.version }}',
              name: 'Release ${{ steps.version.outputs.version }}',
              body: `## Cambios en esta versión\n\n${{ steps.changelog.outputs.notes }}\n\n---\n📖 [GitHub Actions Journey](https://github.com/${{ github.repository }}/blob/main/GITHUB_ACTIONS_JOURNEY.md) · [Roadmap](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md)`,
              draft: false,
              prerelease: false
            });
            console.log(`Release creado: ${release.html_url}`);
